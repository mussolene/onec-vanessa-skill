stages:
  - smoke

repo_checks:
  stage: smoke
  image: python:3.11
  script:
    - python3 skill/scripts/onec_test_cli.py bootstrap --skip-doctor --dry-run
    - python3 skill/scripts/onec_test_cli.py package-skill --dry-run

smoke-tests:
  stage: smoke
  tags:
    - windows
  script:
    - copy .env.example .env
    - python skill/scripts/onec_test_cli.py bootstrap --skip-doctor
    - python skill/scripts/onec_test_cli.py doctor
    - python skill/scripts/onec_test_cli.py run-ui --profile Smoke
    - python skill/scripts/onec_test_cli.py run-xunit --profile Smoke
  artifacts:
    when: always
    paths:
      - artifacts/

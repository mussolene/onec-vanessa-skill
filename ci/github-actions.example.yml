name: 1c-tests-example

on:
  workflow_dispatch:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap dry-run
        run: python3 skill/scripts/onec_test_cli.py bootstrap --skip-doctor --dry-run
      - name: Package dry-run
        run: python3 skill/scripts/onec_test_cli.py package-skill --dry-run

  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare env
        run: |
          cp .env.example .env
          echo "Fill .env with your own secrets and paths before real use."
      - name: Bootstrap
        run: python skill/scripts/onec_test_cli.py bootstrap --skip-doctor
      - name: Doctor
        run: python skill/scripts/onec_test_cli.py doctor
      - name: UI smoke
        run: python skill/scripts/onec_test_cli.py run-ui --profile Smoke
      - name: xUnit smoke
        run: python skill/scripts/onec_test_cli.py run-xunit --profile Smoke
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onec-test-artifacts
          path: artifacts
